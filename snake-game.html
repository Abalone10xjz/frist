<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Arial', sans-serif;
        }

        .game-container {
            text-align: center;
        }

        h1 {
            color: #00ff88;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .score-board {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 15px;
        }

        .score {
            color: #fff;
            font-size: 18px;
        }

        .score span {
            color: #00ff88;
            font-weight: bold;
        }

        canvas {
            border: 3px solid #00ff88;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
            background: #0a0a1a;
        }

        .controls {
            margin-top: 20px;
            color: #888;
            font-size: 14px;
        }

        .btn {
            margin-top: 15px;
            padding: 12px 30px;
            font-size: 16px;
            background: #00ff88;
            color: #1a1a2e;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #00cc6a;
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px 60px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid #ff4444;
            display: none;
        }

        .game-over h2 {
            color: #ff4444;
            margin-bottom: 15px;
            font-size: 32px;
        }

        .game-over p {
            color: #fff;
            font-size: 20px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐍 大蛇不拉屎</h1>
        <div class="score-board">
            <div class="score">分数：<span id="score">0</span></div>
            <div class="score">最高分：<span id="highScore">0</span></div>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="controls">使用方向键或 WASD 控制移动</div>
        <button class="btn" id="startBtn">开始游戏</button>

        <div class="game-over" id="gameOver">
            <h2>游戏结束!</h2>
            <p>最终得分：<span id="finalScore"></span></p>
            <button class="btn" id="restartBtn">重新开始</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [];
        let food = {};
        let obstacles = [];
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop = null;
        let isPlaying = false;
        let speed = 350;

        // 生成随机障碍物
        function spawnObstacles() {
            obstacles = [];
            for (let i = 0; i < 8; i++) {
                obstacles.push({
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                });
            }
        }

        highScoreEl.textContent = highScore;

        function initGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            speed = 500;
            scoreEl.textContent = score;
            spawnObstacles();
            spawnFood();
            gameOverEl.style.display = 'none';
            startBtn.style.display = 'none';
            isPlaying = true;
        }

        function spawnFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };

            // 确保食物不生成在蛇身上
            for (let segment of snake) {
                if (segment.x === food.x && segment.y === food.y) {
                    spawnFood();
                    break;
                }
            }
        }

        function changeDirection(newDir) {
            // 防止反向移动
            if (newDir.x !== -direction.x && newDir.y !== -direction.y) {
                nextDirection = newDir;
            }
        }

        function gameLoopFunc() {
            if (!isPlaying) return;

            direction = nextDirection;

            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            // 检查碰撞（墙壁）
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // 检查碰撞（蛇自身）
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }

            // 检查碰撞（障碍物）
            for (let obstacle of obstacles) {
                if (head.x === obstacle.x && head.y === obstacle.y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head);

            // 检查是否吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                // 每吃 50 分速度加快
                if (score % 50 === 0 && speed > 50) {
                    speed -= 5;
                }
                spawnFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function draw() {
            // 清空画布
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制网格
            ctx.strokeStyle = '#1a1a3a';
            ctx.lineWidth = 0.5;
            for (let i = 0; i < tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // 绘制障碍物
            ctx.fillStyle = '#666';
            for (let obstacle of obstacles) {
                ctx.fillRect(
                    obstacle.x * gridSize + 2,
                    obstacle.y * gridSize + 2,
                    gridSize - 4,
                    gridSize - 4
                );
            }

            // 绘制食物
            ctx.fillStyle = '#ff4444';
            ctx.shadowColor = '#ff4444';
            ctx.shadowBlur = 10;
            ctx.fillRect(
                food.x * gridSize + 2,
                food.y * gridSize + 2,
                gridSize - 4,
                gridSize - 4
            );
            ctx.shadowBlur = 0;

            // 绘制蛇
            snake.forEach((segment, index) => {
                const gradient = ctx.createLinearGradient(
                    segment.x * gridSize,
                    segment.y * gridSize,
                    (segment.x + 1) * gridSize,
                    (segment.y + 1) * gridSize
                );
                gradient.addColorStop(0, index === 0 ? '#ffcc00' : '#ffaa00');
                gradient.addColorStop(1, '#ff8800');
                ctx.fillStyle = gradient;

                if (index === 0) {
                    ctx.shadowColor = '#00ff88';
                    ctx.shadowBlur = 10;
                }

                // 使用普通矩形代替 roundRect（兼容性更好）
                ctx.fillRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );

                // 绘制蛇头眼睛
                if (index === 0) {
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#fff';
                    const eyeSize = 4;
                    const centerX = segment.x * gridSize + gridSize / 2;
                    const centerY = segment.y * gridSize + gridSize / 2;

                    // 根据方向绘制眼睛位置
                    let leftEyeX, leftEyeY, rightEyeX, rightEyeY;
                    if (direction.x === 1) {
                        leftEyeX = centerX + 6;
                        leftEyeY = centerY - 4;
                        rightEyeX = centerX + 6;
                        rightEyeY = centerY + 4;
                    } else if (direction.x === -1) {
                        leftEyeX = centerX - 6;
                        leftEyeY = centerY - 4;
                        rightEyeX = centerX - 6;
                        rightEyeY = centerY + 4;
                    } else if (direction.y === 1) {
                        leftEyeX = centerX - 4;
                        leftEyeY = centerY + 6;
                        rightEyeX = centerX + 4;
                        rightEyeY = centerY + 6;
                    } else {
                        leftEyeX = centerX - 4;
                        leftEyeY = centerY - 6;
                        rightEyeX = centerX + 4;
                        rightEyeY = centerY - 6;
                    }

                    ctx.beginPath();
                    ctx.arc(leftEyeX, leftEyeY, eyeSize, 0, Math.PI * 2);
                    ctx.arc(rightEyeX, rightEyeY, eyeSize, 0, Math.PI * 2);
                    ctx.fill;
                }
            });
            ctx.shadowBlur = 0;
        }

        function gameOver() {
            isPlaying = false;
            clearInterval(gameLoop);
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreEl.textContent = highScore;
            }
            finalScoreEl.textContent = score;
            gameOverEl.style.display = 'block';
            startBtn.style.display = 'inline-block';
        }

        function handleKeyPress(e) {
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    e.preventDefault();
                    changeDirection({ x: 0, y: -1 });
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    e.preventDefault();
                    changeDirection({ x: 0, y: 1 });
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    e.preventDefault();
                    changeDirection({ x: -1, y: 0 });
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    e.preventDefault();
                    changeDirection({ x: 1, y: 0 });
                    break;
            }
        }

        // 事件监听
        document.addEventListener('keydown', handleKeyPress);
        startBtn.addEventListener('click', initGame);
        restartBtn.addEventListener('click', initGame);

        // 开始游戏
        initGame();
        gameLoop = setInterval(gameLoopFunc, speed);
        draw();
    </script>
</body>
</html>
